<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Happy Birthday, Amrita Tamang!</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #ffd6e0 0%, #ffb3c6 40%, #ff9ebb 100%);
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
      overflow-x: hidden;
    }

    body.birthday-mode {
      background: linear-gradient(145deg, #ffd6e0 0%, #ffb3c6 40%, #ffeaa7 100%);
      animation: bgGlow 3s infinite alternate;
    }

    @keyframes bgGlow {
      from { filter: brightness(1); }
      to { filter: brightness(1.05); }
    }

    .hearts-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .heart-float {
      position: absolute;
      color: rgba(255, 255, 255, 0.5);
      font-size: 20px;
      animation: floatHeart 12s linear infinite;
      bottom: -50px;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 0 5px rgba(255, 80, 120, 0.3);
    }

    .balloon-float {
      position: absolute;
      font-size: 40px;
      animation: floatBalloon 8s linear forwards;
      top: -60px;
      user-select: none;
      pointer-events: none;
      z-index: 5;
    }

    @keyframes floatHeart {
      0% { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0.7; }
      50% { opacity: 0.9; transform: translateY(-40vh) rotate(20deg) scale(1); }
      100% { transform: translateY(-90vh) rotate(45deg) scale(0.5); opacity: 0; }
    }

    @keyframes floatBalloon {
      0% { transform: translateY(0) rotate(-5deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(5deg); opacity: 0.8; }
    }

    .birthday-card {
      position: relative;
      z-index: 10;
      max-width: 650px;
      width: 100%;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 48px;
      padding: 36px 28px 40px;
      box-shadow: 0 30px 50px rgba(210, 50, 90, 0.25),
                  0 10px 25px rgba(0, 0, 0, 0.1),
                  inset 0 2px 4px rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 220, 230, 0.6);
      text-align: center;
      transition: transform 0.3s ease;
      overflow: hidden;
    }

    .birthday-card:hover { transform: scale(1.01); }

    body.birthday-mode .birthday-card {
      box-shadow: 0 30px 50px rgba(210, 50, 90, 0.35),
                  0 0 40px rgba(255, 215, 0, 0.3),
                  inset 0 2px 4px rgba(255, 255, 255, 0.9);
      border-color: rgba(255, 215, 0, 0.4);
    }

    .her-photo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #ffb3c6;
      margin-bottom: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .her-photo:hover {
      transform: scale(1.05) rotate(3deg);
      border-color: #e8436e;
    }

    body.birthday-mode .her-photo {
      border-color: #ffd700;
      box-shadow: 0 0 30px #ffd700, 0 10px 20px rgba(0,0,0,0.2);
      animation: photoGlow 2s infinite alternate;
    }

    @keyframes photoGlow {
      from { box-shadow: 0 0 20px #ffd700, 0 10px 20px rgba(0,0,0,0.2); }
      to { box-shadow: 0 0 40px #ffd700, 0 0 60px #ff9ebb, 0 10px 20px rgba(0,0,0,0.2); }
    }

    .cake-icon {
      font-size: 48px;
      margin-bottom: 8px;
      color: #e8436e;
      filter: drop-shadow(0 6px 8px rgba(200, 50, 80, 0.2));
    }

    .to-section {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      margin: 10px 0 12px; flex-wrap: wrap;
    }

    .to-label {
      font-size: 1.3rem; font-weight: 500; color: #a3334b; letter-spacing: 1px;
      background: rgba(255, 240, 245, 0.7); padding: 6px 18px;
      border-radius: 40px; backdrop-filter: blur(4px);
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
    }

    .name-input {
      background: white; border: 2px solid #ffb3c6; border-radius: 60px;
      padding: 12px 22px; font-size: 1.2rem; font-family: 'Poppins', sans-serif;
      font-weight: 500; color: #6b2e42; outline: none; width: min(220px, 100%);
      text-align: center; box-shadow: 0 6px 12px rgba(220, 80, 110, 0.15);
      transition: all 0.2s;
    }

    .name-input[readonly] {
      cursor: default;
      user-select: none;
    }

    .name-input:focus {
      border-color: #e8436e; box-shadow: 0 8px 18px rgba(232, 67, 110, 0.25); width: min(240px, 100%);
    }

    h1 {
      font-family: 'Dancing Script', cursive; font-size: 3.8rem; font-weight: 700;
      color: #9e2a4a; text-shadow: 3px 3px 0 rgba(255, 220, 230, 0.8);
      margin: 15px 0 8px; line-height: 1.2; word-break: break-word;
    }

    body.birthday-mode h1 {
      color: #e8436e; text-shadow: 3px 3px 0 rgba(255, 215, 0, 0.5);
      animation: headingBounce 1s ease-in-out;
    }

    @keyframes headingBounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    #displayName {
      background: linear-gradient(135deg, #b82b5a, #e8436e);
      background-clip: text; -webkit-background-clip: text; color: transparent;
      text-shadow: none; display: inline-block;
    }

    .sub-message {
      font-size: 1.4rem; font-weight: 400; color: #722b44; margin: 12px 0 24px;
      font-style: italic; background: rgba(255, 245, 250, 0.5);
      display: inline-block; padding: 8px 28px; border-radius: 50px;
      backdrop-filter: blur(4px);
    }

    .love-message {
      font-size: 1.2rem; margin: 10px 0 20px; color: #4f2635; font-weight: 400;
      max-width: 480px; margin-left: auto; margin-right: auto;
      padding: 12px 20px; background: rgba(255, 255, 255, 0.4);
      border-radius: 30px; backdrop-filter: blur(4px); border: 1px dashed #d96b8a;
    }

    .love-message i { color: #e8436e; margin: 0 4px; }

    .countdown-container {
      margin: 20px 0; padding: 15px;
      background: linear-gradient(135deg, rgba(255, 179, 198, 0.4), rgba(255, 214, 224, 0.4));
      border-radius: 20px; border: 2px solid rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(10px); box-shadow: 0 8px 20px rgba(210, 50, 90, 0.15);
    }

    .timezone-note {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #8a3750;
      letter-spacing: 0.2px;
    }

    body.birthday-mode .countdown-container {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.4), rgba(255, 179, 198, 0.4));
      border-color: rgba(255, 215, 0, 0.6); animation: countdownPulse 1s infinite;
    }

    @keyframes countdownPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    #countdown {
      font-size: 1.3rem; font-weight: 600; color: #9e2a4a;
      font-family: 'Poppins', sans-serif; letter-spacing: 1px; animation: pulse 2s infinite;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    .buttons-container {
      display: flex; flex-direction: column; gap: 12px;
      align-items: center; margin: 20px 0;
    }

    .btn-celebrate {
      background: #e8436e; border: none; color: white; font-weight: 600;
      font-size: 1.5rem; padding: 18px 32px; border-radius: 60px;
      cursor: pointer; box-shadow: 0 15px 25px rgba(210, 50, 90, 0.4);
      border: 2px solid rgba(255, 255, 255, 0.5); backdrop-filter: blur(5px);
      transition: all 0.25s; display: inline-flex; align-items: center; gap: 12px;
      font-family: 'Poppins', sans-serif; letter-spacing: 1px; width: fit-content;
      justify-content: center;
      max-width: 100%;
      text-align: center;
    }

    .btn-celebrate i { font-size: 1.8rem; }

    .btn-celebrate:hover {
      background: #c72e5c; transform: scale(1.05);
      box-shadow: 0 20px 30px rgba(190, 40, 80, 0.5);
    }

    .btn-celebrate:active { transform: scale(0.98); }

    /* ? LOCKED BUTTON */
    .btn-secret {
      background: transparent; border: 2px solid #ccc; color: #999;
      font-size: 1.2rem; padding: 14px 28px; box-shadow: none;
      cursor: not-allowed; position: relative; overflow: hidden;
    }

    .btn-secret::before { content: "Locked: "; }

    .btn-secret:hover {
      background: transparent; transform: none; box-shadow: none;
      border-color: #ccc; color: #999;
    }

    /* ? UNLOCKED */
    .btn-secret.unlocked {
      background: transparent; border: 2px solid #e8436e; color: #e8436e;
      cursor: pointer; box-shadow: 0 6px 15px rgba(210, 50, 90, 0.2);
      animation: unlockPulse 2s infinite;
    }

    .btn-secret.unlocked::before { content: "Open: "; }

    .btn-secret.unlocked:hover {
      background: rgba(232, 67, 110, 0.1); color: #c72e5c;
      border-color: #c72e5c; transform: scale(1.05);
    }

    @keyframes unlockPulse {
      0%, 100% { box-shadow: 0 6px 15px rgba(210, 50, 90, 0.2); }
      50% { box-shadow: 0 6px 25px rgba(210, 50, 90, 0.4); }
    }

    .locked-message {
      font-size: 0.9rem; color: #b34e6b; margin-top: 8px;
      font-style: italic; opacity: 0.8;
    }

    /* ? PHOTO ALBUM STYLES */
    .photo-album-container {
      display: none;
      margin-top: 30px;
      animation: fadeInUp 1s ease-out;
    }

    .photo-album-container.visible {
      display: block;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .album-title {
      font-family: 'Dancing Script', cursive;
      font-size: 2.5rem;
      color: #9e2a4a;
      margin-bottom: 20px;
      text-shadow: 2px 2px 0 rgba(255, 220, 230, 0.8);
    }

    .photo-carousel {
      position: relative;
      width: 100%;
      height: 400px;
      perspective: 1000px;
      margin: 20px 0;
    }

    .photo-track {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .photo-slide {
      position: absolute;
      width: 280px;
      height: 350px;
      left: 50%;
      top: 50%;
      margin-left: -140px;
      margin-top: -175px;
      background: white;
      padding: 15px 15px 50px 15px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transform-style: preserve-3d;
      transition: all 0.5s ease;
      cursor: pointer;
    }

    .photo-slide.active {
      transform: translateZ(100px) scale(1.1);
      z-index: 10;
      box-shadow: 0 20px 40px rgba(232, 67, 110, 0.3);
    }

    .photo-slide.prev {
      transform: translateX(-200px) translateZ(-100px) rotateY(25deg) scale(0.9);
      opacity: 0.6;
      filter: blur(2px);
    }

    .photo-slide.next {
      transform: translateX(200px) translateZ(-100px) rotateY(-25deg) scale(0.9);
      opacity: 0.6;
      filter: blur(2px);
    }

    .photo-slide.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .photo-slide img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: 5px;
      pointer-events: none;
    }

    .photo-caption {
      position: absolute;
      bottom: 15px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Dancing Script', cursive;
      font-size: 1.3rem;
      color: #e8436e;
      padding: 0 12px;
      line-height: 1.25;
    }

    .album-nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .nav-btn {
      background: rgba(255,255,255,0.8);
      border: 2px solid #e8436e;
      color: #e8436e;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-btn:hover {
      background: #e8436e;
      color: white;
      transform: scale(1.1);
    }

    .nav-btn.secondary {
      width: auto;
      border-radius: 999px;
      padding: 0 18px;
    }

    .photo-indicators {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 15px;
    }

    .indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(232, 67, 110, 0.3);
      cursor: pointer;
      transition: all 0.3s;
    }

    .indicator.active {
      background: #e8436e;
      transform: scale(1.3);
    }

    #secretMsg {
      display: none;
      margin-top: 20px;
      padding: 25px;
      background: linear-gradient(135deg, rgba(255, 240, 245, 0.9), rgba(255, 255, 255, 0.9));
      border-radius: 20px;
      border-left: 5px solid #e8436e;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      font-size: 1.1rem;
      color: #4f2635;
      line-height: 1.8;
      text-align: left;
      position: relative;
      animation: slideDown 0.5s ease-out;
      font-family: 'Dancing Script', cursive;
      font-size: 1.4rem;
    }

    #secretMsg.visible {
      display: block;
    }

    .letter-body {
      min-height: 210px;
      white-space: normal;
      transition: text-shadow 0.3s ease, transform 0.3s ease;
    }

    #secretMsg.typing-active .letter-body {
      text-shadow: 0 0 14px rgba(232, 67, 110, 0.08);
      transform: translateY(-1px);
    }

    .letter-signoff {
      margin-top: 16px;
      text-align: right;
    }

    .typing-cursor {
      display: inline-block;
      width: 0.6em;
      color: #e8436e;
      animation: blinkCursor 0.9s steps(1) infinite;
    }

    #secretMsg::before {
      content: "Note";
      position: absolute;
      top: -15px;
      right: 20px;
      font-size: 2rem;
      background: white;
      padding: 0 10px;
      border-radius: 50%;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes blinkCursor {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    body.fireworks-mode {
      background: linear-gradient(160deg, #2a0620 0%, #571347 45%, #ff6f91 100%);
      animation: none;
    }

    body.fireworks-mode::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.2), transparent 18%),
        radial-gradient(circle at 80% 15%, rgba(255, 222, 89, 0.15), transparent 18%),
        radial-gradient(circle at 50% 5%, rgba(255, 182, 193, 0.18), transparent 22%),
        linear-gradient(180deg, rgba(97, 16, 47, 0.08), rgba(46, 8, 44, 0.26));
      pointer-events: none;
      z-index: 0;
    }

    body.fireworks-mode::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        radial-gradient(circle at 12% 18%, rgba(255,255,255,0.95) 0 1px, transparent 2px),
        radial-gradient(circle at 26% 10%, rgba(255,232,173,0.9) 0 1.4px, transparent 2.6px),
        radial-gradient(circle at 48% 22%, rgba(255,255,255,0.8) 0 1.2px, transparent 2.4px),
        radial-gradient(circle at 67% 16%, rgba(255,214,224,0.85) 0 1.3px, transparent 2.5px),
        radial-gradient(circle at 82% 8%, rgba(255,255,255,0.95) 0 1px, transparent 2px),
        radial-gradient(circle at 90% 24%, rgba(255,232,173,0.9) 0 1.5px, transparent 2.7px);
      animation: twinkleStars 3.8s ease-in-out infinite alternate;
    }

    @keyframes twinkleStars {
      from { opacity: 0.55; }
      to { opacity: 1; }
    }

    .rose-petal {
      position: absolute;
      top: -40px;
      width: 16px;
      height: 24px;
      background: linear-gradient(180deg, #ff9eb5 0%, #ff5f87 100%);
      border-radius: 70% 0 70% 0;
      opacity: 0.85;
      transform: rotate(25deg);
      animation: fallPetal linear forwards;
      box-shadow: inset -2px -3px 4px rgba(166, 20, 69, 0.18);
      z-index: 4;
    }

    .rose-petal::after {
      content: "";
      position: absolute;
      inset: 2px 5px auto auto;
      width: 5px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.35);
      transform: rotate(20deg);
    }

    @keyframes fallPetal {
      0% { transform: translate3d(0, -10vh, 0) rotate(0deg) scale(0.9); opacity: 0; }
      10% { opacity: 0.9; }
      50% { transform: translate3d(25px, 45vh, 0) rotate(180deg) scale(1); }
      100% { transform: translate3d(-35px, 110vh, 0) rotate(360deg) scale(0.8); opacity: 0; }
    }

    .signature {
      margin-top: 30px;
      font-family: 'Dancing Script', cursive;
      font-size: 1.9rem;
      color: #892e4a;
      border-top: 2px dotted #e7a3b7;
      padding-top: 22px;
      display: inline-block;
    }

    .signature i,
    .small-note i,
    .music-indicator i {
      color: #e8436e;
    }

    .small-note {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #b34e6b;
      opacity: 0.8;
      line-height: 1.5;
    }

    .music-indicator {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.9);
      padding: 10px 15px;
      border-radius: 30px;
      font-size: 0.9rem;
      color: #e8436e;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      display: none;
      align-items: center;
      gap: 8px;
      z-index: 100;
      animation: fadeIn 0.5s;
    }

    .music-indicator.active { display: flex; }

    .music-indicator i { animation: bounce 1s infinite; }

    .music-controls {
      position: fixed;
      left: 20px;
      bottom: 20px;
      z-index: 100;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .music-control-btn {
      border: none;
      border-radius: 999px;
      min-height: 48px;
      padding: 0 18px;
      background: rgba(255, 255, 255, 0.92);
      color: #c23664;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .music-control-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(0,0,0,0.16);
    }

    .photo-lightbox {
      position: fixed;
      inset: 0;
      z-index: 140;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(28, 7, 24, 0.76);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .photo-lightbox.visible {
      display: flex;
    }

    .lightbox-card {
      width: min(92vw, 760px);
      background: rgba(255, 252, 253, 0.96);
      border-radius: 28px;
      padding: 18px;
      box-shadow: 0 28px 60px rgba(0,0,0,0.28);
      position: relative;
      animation: fadeInUp 0.4s ease-out;
    }

    .lightbox-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: rgba(232, 67, 110, 0.12);
      color: #e8436e;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .lightbox-image {
      width: 100%;
      max-height: 70vh;
      object-fit: cover;
      border-radius: 18px;
      display: block;
    }

    .lightbox-title {
      margin-top: 16px;
      font-family: 'Dancing Script', cursive;
      font-size: 2rem;
      color: #9e2a4a;
      text-align: center;
    }

    .lightbox-caption {
      margin-top: 6px;
      text-align: center;
      color: #6c3347;
      line-height: 1.6;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 768px) {
      body {
        display: block;
        padding: 14px;
      }

      .birthday-card {
        margin: 0 auto;
        border-radius: 34px;
        padding: 28px 20px 30px;
      }

      .birthday-card:hover {
        transform: none;
      }

      h1 {
        font-size: clamp(2.5rem, 10vw, 3.4rem);
      }

      .sub-message,
      .love-message,
      #secretMsg {
        width: 100%;
      }

      .love-message,
      #secretMsg {
        padding-left: 16px;

      .btn-celebrate i {

      .photo-carousel {

      .photo-slide {

      .photo-slide.prev {

    @media (max-width: 500px) {
      .birthday-card {
        padding: 24px 16px 28px;

      .cake-icon {

      .to-section {

      }

      .photo-slide {

        height: 225px;
        margin-left: -85px;
        margin-top: -112px;
        padding: 10px 10px 42px 10px;
      }

      .photo-slide img {

    @media (max-width: 360px) {
      body {

        padding-right: 12px;

<body>

  <audio id="bgMusic" loop preload="auto" playsinline>
    <source src="BirthdaySong/BirthdaySong.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <div class="hearts-bg" id="heartsContainer"></div>

  <div class="birthday-card">
    <div class="cake-icon"><i class="fas fa-birthday-cake"></i></div>
    
    <img src="photo/cover.jpg" alt="Her Photo" class="her-photo" id="herPhoto" onclick="enlargePhoto()">
    
    <div class="to-section">
      <span class="to-label"><i class="fas fa-heart" style="color: #e8436e; margin-right: 6px;"></i> To:</span>
      <input type="text" id="nameInput" class="name-input" value="Amrita Tamang" placeholder="Her name" maxlength="20" readonly>
    </div>

    <h1>Happy Birthday, <br><span id="displayName">Amrita Tamang</span>!</h1>

    <div class="sub-message">
      <i class="fas fa-star" style="color: #f7b731;"></i> The most wonderful day <i class="fas fa-star" style="color: #f7b731;"></i>
    </div>

    <div class="countdown-container">
      <div id="countdown">Loading countdown...</div>
      <div class="timezone-note">Countdown follows Nepal Time (NPT, UTC+5:45)</div>
    </div>

    <div class="love-message">
      <i class="fas fa-heart"></i> You make every moment brighter. <br>
      I'm so lucky to call you mine. <i class="fas fa-heart"></i>
    </div>

    <div class="buttons-container">
      <button class="btn-celebrate" id="celebrateBtn">
        <i class="fas fa-gift"></i> Celebrate! <i class="fas fa-glass-cheers"></i>
      </button>
      
      <button class="btn-celebrate btn-secret" id="secretBtn" onclick="showMessage()" disabled>
        Open Secret Message
      </button>
      
      <div class="locked-message" id="lockedMsg">Unlock at midnight...</div>
    </div>

    <div id="secretMsg">
      <div class="letter-body" id="letterBody"></div>
      <div class="letter-signoff" id="letterSignoff"></div>
    </div>

    <!-- ? ANIMATED PHOTO ALBUM -->
    <div class="photo-album-container" id="photoAlbum">
      <div class="album-title">Our Beautiful Memories</div>

      <div class="photo-carousel" id="photoCarousel">
        <div class="photo-track" id="photoTrack"></div>
        
        <div class="album-nav">
          <button class="nav-btn" onclick="prevPhoto()"><i class="fas fa-chevron-left"></i></button>
          <button class="nav-btn" onclick="nextPhoto()"><i class="fas fa-chevron-right"></i></button>
        </div>
        
        <div class="photo-indicators" id="indicators"></div>
      </div>
    </div>

    <div class="signature">
      With all my love,<br> 
      <span style="font-size: 2.2rem;"><i class="fas fa-heart"></i></span>
    </div>
  </div>

  <div class="music-indicator" id="musicIndicator">
    <i class="fas fa-music"></i>
    <span>Music Playing</span>
  </div>

  <div class="music-controls">
    <button class="music-control-btn" id="musicToggleBtn"><i class="fas fa-play"></i> Play Music</button>
  </div>

  <div class="photo-lightbox" id="photoLightbox" aria-hidden="true">
    <div class="lightbox-card">
      <button class="lightbox-close" id="lightboxCloseBtn" aria-label="Close photo preview"><i class="fas fa-times"></i></button>
      <img class="lightbox-image" id="lightboxImage" alt="Memory preview">
      <div class="lightbox-title" id="lightboxTitle"></div>
      <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>
  </div>

  <script>
    (function(){
      "use strict";

      const nameInput = document.getElementById('nameInput');
      const celebrateBtn = document.getElementById('celebrateBtn');
      const secretBtn = document.getElementById('secretBtn');
      const lockedMsg = document.getElementById('lockedMsg');
      const heartsContainer = document.getElementById('heartsContainer');
      const bgMusic = document.getElementById('bgMusic');
      const musicIndicator = document.getElementById('musicIndicator');
      const photoAlbum = document.getElementById('photoAlbum');
      const photoTrack = document.getElementById('photoTrack');
      const photoCarousel = document.getElementById('photoCarousel');
      const herPhoto = document.getElementById('herPhoto');
      const secretMsg = document.getElementById('secretMsg');
      const letterBody = document.getElementById('letterBody');
      const letterSignoff = document.getElementById('letterSignoff');
      const musicToggleBtn = document.getElementById('musicToggleBtn');
      const photoLightbox = document.getElementById('photoLightbox');
      const lightboxImage = document.getElementById('lightboxImage');
      const lightboxTitle = document.getElementById('lightboxTitle');
      const lightboxCaption = document.getElementById('lightboxCaption');
      const lightboxCloseBtn = document.getElementById('lightboxCloseBtn');

      let currentPhotoIndex = 0;
      let albumPhotos = [];
      let shouldAutoPlayMusicOnInteraction = false;
      let letterTypingStarted = false;
      let letterRevealTimer = null;
      let audioContext = null;

      const secretLetterParagraphs = [
        "My Dearest Love,",
        "You are the best thing that ever happened to me. Every day with you feels like a beautiful dream I never want to wake up from. Your smile lights up my world, and your love fills my heart in ways I never knew possible.",
        "On this special day, I want you to know that my love for you grows stronger with every passing moment. You are my today and all of my tomorrows.",
        "Happy Birthday, my everything. I love you forever and always."
      ];

      const secretLetterSignoff = "Yours forever,";

      function escapeHtml(value) {
        return value.replace(/[&<>"']/g, function(char) {
          const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
          };
          return map[char];
        });
      }

      function createPlaceholderDataUri(title, accent) {
        const svg = `
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
            <defs>
              <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="${accent}"/>
                <stop offset="100%" stop-color="#ffe6ee"/>
              </linearGradient>
            </defs>
            <rect width="600" height="600" rx="48" fill="url(#g)"/>
            <circle cx="480" cy="115" r="56" fill="rgba(255,255,255,0.35)"/>
            <circle cx="140" cy="460" r="70" fill="rgba(255,255,255,0.18)"/>
            <text x="50%" y="48%" text-anchor="middle" font-size="58" font-family="Poppins, Arial, sans-serif" fill="#8d2f4a">Birthday Album</text>
            <text x="50%" y="59%" text-anchor="middle" font-size="34" font-family="Poppins, Arial, sans-serif" fill="#b03a5b">${title}</text>
          </svg>`;
        return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
      }

      function getBaseAlbumPhotos() {
        return [
          { src: 'photo/photo1.jpg', title: 'Our First Date', caption: 'The evening I realized my heart had already chosen you.' },
          { src: 'photo/photo2.jpg', title: 'That Smile', caption: 'The smile that turns ordinary days into my favorite memories.' },
          { src: 'photo/photo3.jpg', title: 'Adventure Time', caption: 'No matter where we go, every road feels softer beside you.' },
          { src: 'photo/photo4.jpg', title: 'My Favorite Person', caption: 'My safest place, my happiest thought, my forever favorite person.' }
        ];
      }

      function updateMusicToggleLabel() {
        musicToggleBtn.innerHTML = bgMusic.paused
          ? '<i class="fas fa-play"></i> Play Music'
          : '<i class="fas fa-pause"></i> Pause Music';
      }

      function primeAudioContext() {
        if (audioContext) return;
        const Context = window.AudioContext || window.webkitAudioContext;
        if (!Context) return;
        audioContext = new Context();
      }

      function playTypingTick() {
        if (!audioContext || audioContext.state !== 'running') return;
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.type = 'triangle';
        oscillator.frequency.value = 880;
        gainNode.gain.value = 0.0001;
        gainNode.gain.exponentialRampToValueAtTime(0.009, audioContext.currentTime + 0.01);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.06);

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        oscillator.start();
        oscillator.stop(audioContext.currentTime + 0.07);
      }

      herPhoto.addEventListener('error', function handlePhotoError() {
        herPhoto.src = createPlaceholderDataUri('Main Photo', '#ffcad4');
      }, { once: true });

      function getTotalPhotos() {
        return albumPhotos.length;
      }

      function renderAlbum() {
        photoTrack.innerHTML = '';
        photoCarousel.style.display = 'block';

        albumPhotos.forEach((photo, index) => {
          const slide = document.createElement('div');
          slide.className = 'photo-slide';
          slide.dataset.index = index;
          slide.innerHTML = `
            <img src="${photo.src}" alt="${escapeHtml(photo.title)}">
            <div class="photo-caption">${escapeHtml(photo.caption)}</div>
          `;
          photoTrack.appendChild(slide);
        });

        photoTrack.querySelectorAll('img').forEach((img, index) => {
          img.addEventListener('error', function handleSlideError() {
            img.src = createPlaceholderDataUri(`Memory ${index + 1}`, '#ffccd9');
          }, { once: true });
        });

        createIndicators();
        goToPhoto(Math.min(currentPhotoIndex, Math.max(getTotalPhotos() - 1, 0)));
      }

      function updateName() {
        let name = nameInput.value.trim();
        if (name === '') {
          name = 'Amrita Tamang';
          nameInput.value = 'Amrita Tamang';
        }
        const currentDisplayName = document.getElementById('displayName');
        if (currentDisplayName) {
          currentDisplayName.textContent = name;
        }
      }

      updateName();
      albumPhotos = getBaseAlbumPhotos();
      renderAlbum();

      function fireConfetti() {
        confetti({
          particleCount: 150,
          spread: 100,
          origin: { y: 0.6 },
          colors: ['#ff9ebb', '#ffb3c6', '#ffffff', '#e8436e', '#f7d794']
        });
        confetti({
          particleCount: 120,
          spread: 80,
          origin: { y: 0.5, x: 0.3 },
          colors: ['#ffb3c6', '#fdcb6e', '#e8436e', '#fd79a8']
        });
        confetti({
          particleCount: 120,
          spread: 80,
          origin: { y: 0.5, x: 0.7 },
          colors: ['#ffeaa7', '#e8436e', '#d63031', '#ff9f43']
        });
        setTimeout(() => {
          confetti({
            particleCount: 80,
            angle: 60,
            spread: 55,
            origin: { x: 0, y: 0.7 },
            colors: ['#e8436e', '#ffb3c6', '#ffffff']
          });
          confetti({
            particleCount: 80,
            angle: 120,
            spread: 55,
            origin: { x: 1, y: 0.7 },
            colors: ['#fd79a8', '#fdcb6e', '#ffeaa7']
          });
        }, 150);
        setTimeout(() => {
          confetti({
            particleCount: 200,
            spread: 120,
            origin: { y: 0.5 },
            colors: ['#e8436e', '#ffb3c6', '#d63031', '#f8c291']
          });
        }, 300);
      }

      function showMusicIndicator(duration) {
        musicIndicator.classList.add('active');
        if (duration) {
          setTimeout(() => musicIndicator.classList.remove('active'), duration);
        }
      }

      function playBackgroundMusic(options = {}) {
        const keepIndicatorVisible = Boolean(options.keepIndicatorVisible);
        const shouldRetryOnInteraction = options.retryOnInteraction !== false;

        bgMusic.play().then(() => {
          shouldAutoPlayMusicOnInteraction = false;
          showMusicIndicator(keepIndicatorVisible ? 0 : 3000);
          updateMusicToggleLabel();
        }).catch(error => {
          console.log("Audio play failed:", error);
          if (shouldRetryOnInteraction) {
            shouldAutoPlayMusicOnInteraction = true;
          }
        });
      }

      function tryDeferredMusicStart() {
        if (!shouldAutoPlayMusicOnInteraction) return;
        playBackgroundMusic({ keepIndicatorVisible: true, retryOnInteraction: false });
      }

      ['click', 'touchstart', 'keydown'].forEach((eventName) => {
        window.addEventListener(eventName, tryDeferredMusicStart, { passive: true });
      });

      musicToggleBtn.addEventListener('click', function() {
        primeAudioContext();
        if (audioContext && audioContext.state === 'suspended') {
          audioContext.resume().catch(() => {});
        }
        if (bgMusic.paused) {
          playBackgroundMusic({ keepIndicatorVisible: true });
        } else {
          bgMusic.pause();
          musicIndicator.classList.remove('active');
          updateMusicToggleLabel();
        }
      });

      bgMusic.addEventListener('pause', updateMusicToggleLabel);
      bgMusic.addEventListener('play', updateMusicToggleLabel);
      updateMusicToggleLabel();

      celebrateBtn.addEventListener('click', function() {
        playBackgroundMusic();
        
        fireConfetti();
        
        for (let i = 0; i < 6; i++) {
          setTimeout(() => createFloatingHeart(), i * 60);
        }
      });

      window.addEventListener('load', function() {
        setTimeout(() => {
          confetti({
            particleCount: 80,
            spread: 70,
            origin: { y: 0.5 },
            colors: ['#ff9ebb', '#e8436e', '#ffffff', '#f7b731']
          });
        }, 200);
      });

      function createFloatingHeart() {
        const heart = document.createElement('div');
        heart.className = 'heart-float';
        const icons = ['<i class="fas fa-heart"></i>', '<i class="fas fa-heart"></i>', '<i class="fas fa-heart"></i>', '<i class="fas fa-star"></i>', '<i class="fas fa-heart"></i>', '<i class="fas fa-heart"></i>', '<i class="fas fa-heart"></i>', '<i class="fas fa-star"></i>'];
        heart.innerHTML = icons[Math.floor(Math.random() * icons.length)];
        
        const size = Math.floor(Math.random() * 28) + 18;
        heart.style.fontSize = size + 'px';
        heart.style.left = Math.random() * 100 + '%';
        heart.style.animationDuration = (Math.random() * 8 + 8) + 's';
        heart.style.animationDelay = (Math.random() * 5) + 's';
        heart.style.opacity = Math.random() * 0.5 + 0.3;
        
        heartsContainer.appendChild(heart);
        
        setTimeout(() => {
          if (heart.parentNode) {
            heart.remove();
          }
        }, 18000);
      }

      function createBalloon() {
        const balloon = document.createElement('div');
        balloon.className = 'balloon-float';
        const icons = ['<i class="fas fa-gift"></i>', '<i class="fas fa-star"></i>', '<i class="fas fa-glass-cheers"></i>', '<i class="fas fa-magic"></i>', '<i class="fas fa-birthday-cake"></i>', '<i class="fas fa-heart"></i>', '<i class="fas fa-gift"></i>', '<i class="fas fa-star"></i>'];
        balloon.innerHTML = icons[Math.floor(Math.random() * icons.length)];
        
        balloon.style.left = Math.random() * 100 + '%';
        balloon.style.animationDuration = (Math.random() * 3 + 6) + 's';
        balloon.style.fontSize = (Math.floor(Math.random() * 20) + 30) + 'px';
        
        heartsContainer.appendChild(balloon);
        
        setTimeout(() => {
          if (balloon.parentNode) {
            balloon.remove();
          }
        }, 9000);
      }

      function createRosePetal() {
        const petal = document.createElement('div');
        petal.className = 'rose-petal';
        petal.style.left = Math.random() * 100 + '%';
        petal.style.animationDuration = (Math.random() * 4 + 7) + 's';
        petal.style.opacity = (Math.random() * 0.3 + 0.55).toFixed(2);
        petal.style.transform = `rotate(${Math.random() * 180}deg) scale(${(Math.random() * 0.5 + 0.8).toFixed(2)})`;

        heartsContainer.appendChild(petal);

        setTimeout(() => {
          if (petal.parentNode) {
            petal.remove();
          }
        }, 12000);
      }

      function launchFireworkBurst() {
        confetti({
          particleCount: 100,
          spread: 90,
          startVelocity: 50,
          ticks: 220,
          origin: { x: Math.random(), y: Math.random() * 0.35 + 0.05 },
          colors: ['#ffd700', '#ff8fab', '#ffffff', '#7bdff2', '#ff6b6b']
        });
      }

      function startTypingLetter() {
        if (letterTypingStarted) return;

        letterTypingStarted = true;
        secretMsg.classList.add('typing-active');
        letterBody.innerHTML = '<span class="typing-cursor">|</span>';
        letterSignoff.textContent = '';

        const fullText = secretLetterParagraphs.join('\n\n');
        let currentIndex = 0;

        function renderTypingFrame() {
          const typedText = escapeHtml(fullText.slice(0, currentIndex))
            .replace(/\n\n/g, '<br><br>')
            .replace(/\n/g, '<br>');

          letterBody.innerHTML = `${typedText}<span class="typing-cursor">|</span>`;
          if (fullText[currentIndex] && fullText[currentIndex] !== '\n' && fullText[currentIndex] !== ' ') {
            playTypingTick();
          }
          currentIndex += 1;

          if (currentIndex <= fullText.length) {
            const previousChar = fullText[currentIndex - 1];
            const delay = previousChar === '\n'
              ? 240
              : /[,.!?]/.test(previousChar)
                ? 170
                : 38;
            letterRevealTimer = setTimeout(renderTypingFrame, delay);
          } else {
            secretMsg.classList.remove('typing-active');
            letterBody.innerHTML = typedText;
            letterSignoff.textContent = secretLetterSignoff;
            setTimeout(() => {
              revealPhotoAlbum();
            }, 1000);
          }
        }

        renderTypingFrame();
      }

      for (let i = 0; i < 20; i++) {
        createFloatingHeart();
      }

      setInterval(() => {
        if (heartsContainer.children.length < 40) {
          createFloatingHeart();
        }
      }, 1800);

      // Countdown Logic
      const birthday = Date.UTC(2026, 3, 13, 18, 15, 0); // April 14, 2026 12:00 AM Nepal time (UTC+5:45)
      
      function updateCountdown() {
        const now = new Date().getTime();
        const diff = birthday - now;
        const countdownEl = document.getElementById("countdown");

        if (diff > 0) {
          const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
          const minutes = Math.floor((diff % (1000*60*60)) / (1000*60));
          const seconds = Math.floor((diff % (1000*60)) / 1000);
          
          countdownEl.innerHTML = `${hours}h ${minutes}m ${seconds}s until your special day!`;
        } else {
          countdownEl.innerHTML = `IT'S YOUR BIRTHDAY!`;
          countdownEl.style.fontSize = "1.6rem";
          countdownEl.style.color = "#e8436e";
          countdownEl.style.animation = "pulse 1s infinite";
          
          if (!window.celebrationTriggered) {
            window.celebrationTriggered = true;
            midnightCelebration();
          }
        }
      }
      
      function midnightCelebration() {
        document.body.classList.add('birthday-mode');
        document.body.classList.add('fireworks-mode');
        
        // Confetti explosion
        const duration = 15 * 1000;
        const animationEnd = Date.now() + duration;
        
        const interval = setInterval(function() {
          const timeLeft = animationEnd - Date.now();
          if (timeLeft <= 0) {
            clearInterval(interval);
            return;
          }
          confetti({
            particleCount: 100,
            spread: 360,
            origin: { y: 0.6 },
            colors: ['#ff9ebb', '#ffb3c6', '#ffd700', '#e8436e', '#ffffff', '#ff6b9d']
          });
        }, 250);

        const fireworksInterval = setInterval(() => {
          launchFireworkBurst();
        }, 900);
        setTimeout(() => clearInterval(fireworksInterval), 18000);
        
        // Update UI
        document.querySelector('h1').innerHTML = `Happy Birthday,<br><span id="displayName">My Love</span>!`;
        updateName();
        celebrateBtn.innerHTML = '<i class="fas fa-birthday-cake"></i> Make a Wish! <i class="fas fa-magic"></i>';
        
        // Unlock button
        secretBtn.disabled = false;
        secretBtn.classList.add('unlocked');
        secretBtn.innerHTML = 'Open Secret Message & Photos';
        lockedMsg.innerHTML = 'Your gift is ready!';
        lockedMsg.style.color = '#e8436e';
        lockedMsg.style.fontWeight = '600';
        
        // Auto-start music
        playBackgroundMusic({ keepIndicatorVisible: true });
        
        // Balloon rain
        const balloonInterval = setInterval(() => {
          createBalloon();
        }, 300);
        setTimeout(() => clearInterval(balloonInterval), 30000);

        const petalInterval = setInterval(() => {
          if (heartsContainer.children.length < 70) {
            createRosePetal();
          }
        }, 240);
        setTimeout(() => clearInterval(petalInterval), 30000);
      }
      
      setInterval(updateCountdown, 1000);
      updateCountdown();

      // Modified showMessage to reveal album
      window.showMessage = function() {
        if (secretBtn.disabled) return;
        primeAudioContext();
        if (audioContext && audioContext.state === 'suspended') {
          audioContext.resume().catch(() => {});
        }

        // Show message first time
        if (!secretMsg.classList.contains('visible')) {
          secretMsg.classList.add('visible');
          secretBtn.innerHTML = '<i class="fas fa-images"></i> View Photo Album';
          secretMsg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          startTypingLetter();

          confetti({
            particleCount: 50,
            spread: 60,
            origin: { y: 0.8 },
            colors: ['#e8436e', '#ffb3c6', '#ffffff']
          });
        } else if (!photoAlbum.classList.contains('visible')) {
          // If message already shown, just show album
          revealPhotoAlbum();
        } else {
          // Toggle carousel view
          secretMsg.classList.remove('visible');
          photoAlbum.classList.remove('visible');
          secretBtn.innerHTML = '<i class="fas fa-envelope"></i> Open Secret Message & Photos';
        }
      };

      function revealPhotoAlbum() {
        photoAlbum.classList.add('visible');
        
        // Create indicators
        createIndicators();
        
        confetti({
          particleCount: 100,
          spread: 80,
          origin: { y: 0.9 },
          colors: ['#ffd700', '#e8436e', '#ffb3c6', '#ffffff']
        });
        
        photoAlbum.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      function createIndicators() {
        const container = document.getElementById('indicators');
        container.innerHTML = '';
        for (let i = 0; i < getTotalPhotos(); i++) {
          const dot = document.createElement('div');
          dot.className = 'indicator' + (i === currentPhotoIndex ? ' active' : '');
          dot.onclick = () => goToPhoto(i);
          container.appendChild(dot);
        }
      }

      // Photo Carousel Functions
      window.nextPhoto = function() {
        if (!getTotalPhotos()) return;
        goToPhoto((currentPhotoIndex + 1) % getTotalPhotos());
      };

      window.prevPhoto = function() {
        if (!getTotalPhotos()) return;
        goToPhoto((currentPhotoIndex - 1 + getTotalPhotos()) % getTotalPhotos());
      };

      function goToPhoto(index) {
        if (!getTotalPhotos()) return;
        currentPhotoIndex = index;
        const slides = document.querySelectorAll('.photo-slide');
        
        slides.forEach((slide, i) => {
          slide.className = 'photo-slide';
          if (i === index) {
            slide.classList.add('active');
          } else if (i === (index - 1 + getTotalPhotos()) % getTotalPhotos()) {
            slide.classList.add('prev');
          } else if (i === (index + 1) % getTotalPhotos()) {
            slide.classList.add('next');
          } else {
            slide.classList.add('hidden');
          }
        });
        
        // Update indicators
        document.querySelectorAll('.indicator').forEach((dot, i) => {
          dot.classList.toggle('active', i === index);
        });
        
        // Add confetti on photo change
        if (Math.random() > 0.5) {
          confetti({
            particleCount: 20,
            spread: 40,
            origin: { y: 0.8 },
            colors: ['#ffb3c6', '#ffd700']
          });
        }
      }

      function openLightbox(index) {
        const photo = albumPhotos[index];
        if (!photo) return;
        lightboxImage.src = photo.src;
        lightboxImage.alt = photo.title;
        lightboxTitle.textContent = photo.title;
        lightboxCaption.textContent = photo.caption;
        photoLightbox.classList.add('visible');
        photoLightbox.setAttribute('aria-hidden', 'false');
      }

      function closeLightbox() {
        photoLightbox.classList.remove('visible');
        photoLightbox.setAttribute('aria-hidden', 'true');
      }

      photoTrack.addEventListener('click', function(event) {
        const slide = event.target.closest('.photo-slide');
        if (!slide) return;
        const index = Number(slide.dataset.index);
        if (Number.isNaN(index)) return;
        openLightbox(index);
      });

      lightboxCloseBtn.addEventListener('click', closeLightbox);
      photoLightbox.addEventListener('click', function(event) {
        if (event.target === photoLightbox) {
          closeLightbox();
        }
      });

      window.addEventListener('keydown', function(event) {
        if (event.key === 'Escape') {
          closeLightbox();
        }
      });

      // Auto-advance carousel
      setInterval(() => {
        if (photoAlbum.classList.contains('visible') && 
            document.getElementById('photoCarousel').style.display === 'block') {
          nextPhoto();
        }
      }, 5000);

      window.enlargePhoto = function() {
        const photo = document.getElementById('herPhoto');
        if (photo.style.transform === 'scale(2)') {
          photo.style.transform = 'scale(1)';
          photo.style.zIndex = '1';
        } else {
          photo.style.transform = 'scale(2)';
          photo.style.zIndex = '100';
          photo.style.position = 'relative';
        }
      };

    })();
  </script>
</body>
</html>
